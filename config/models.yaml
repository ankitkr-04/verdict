# Model/backend wiring. ${ENV:-default} placeholders are expanded at load time.
# No Fireworks model IDs live here — they arrive via ALLOWED_MODELS at runtime.

local:
  backend: ${VERDICT_LOCAL_BACKEND:-llama}        # llama | mock
  base_url: ${VERDICT_LOCAL_BASE_URL:-http://127.0.0.1:8080/v1}
  # llama-server ignores the name; vLLM (hackathon pod) requires it to match the
  # served model exactly — set VERDICT_LOCAL_MODEL when pointing at vllm serve.
  model: ${VERDICT_LOCAL_MODEL:-local}
  slots: ${VERDICT_LOCAL_SLOTS:-4}                # must match llama-server --parallel
  # HTTP read timeout for a local generation. The local model is FREE — the real cap
  # on local work is the per-task asyncio deadline (VERDICT_TASK_CEILING_S). This must
  # stay >= that deadline, or httpx abandons a still-running generation early, leaving
  # the llama-server slot busy (zombie) and backing up the queue → cascading timeouts.
  timeout_s: ${VERDICT_LOCAL_TIMEOUT_S:-120}
  logprobs: true
  # Appended to the user message when a category has thinking disabled.
  # Qwen3.5 Small ships with reasoning OFF by default, so nothing is needed.
  # Running an older Qwen3 instead? Set this back to " /no_think".
  no_think_suffix: "${VERDICT_NO_THINK_SUFFIX:-}"
  # Official Qwen3.5 instruct-mode sampling (model card). The Qwen3 family is
  # documented to degrade/loop under greedy decoding — do not zero these out.
  # Per-category overrides live in categories.yaml under `sampling:`.
  sampling:
    top_p: ${VERDICT_LOCAL_TOP_P:-0.8}
    top_k: ${VERDICT_LOCAL_TOP_K:-20}
    min_p: ${VERDICT_LOCAL_MIN_P:-0.0}
    presence_penalty: ${VERDICT_LOCAL_PRESENCE_PENALTY:-1.5}

remote:
  backend: ${VERDICT_REMOTE_BACKEND:-fireworks}   # fireworks | mock
  # Model choice is decided OFFLINE (eval/bakeoff.py with your own key), then frozen
  # here as substring preferences — the judged run never explores/cascades, it makes
  # exactly one call per escalation to the first ALLOWED_MODELS entry matching a
  # pattern (case-insensitive). No match -> `prefer` -> first allowed model.
  # Only models from ALLOWED_MODELS are ever called (rule compliance).
  # Preferences are supplied via env only (.env in dev, -e flags in Docker) so no
  # model-name strings live in the public repo; empty -> first ALLOWED_MODELS entry.
  prefer: "${VERDICT_REMOTE_PREFER:-}"
  category_prefer:                                # per-category, filled from bake-off results
    math: "${VERDICT_PREFER_MATH:-}"
    logic: "${VERDICT_PREFER_LOGIC:-}"
    code_gen: "${VERDICT_PREFER_CODE_GEN:-}"
    code_debug: "${VERDICT_PREFER_CODE_DEBUG:-}"
    factual: "${VERDICT_PREFER_FACTUAL:-}"
    summarize: "${VERDICT_PREFER_SUMMARIZE:-}"
    sentiment: "${VERDICT_PREFER_SENTIMENT:-}"
    ner: "${VERDICT_PREFER_NER:-}"
  timeout_s: 25
  max_retries: 1
  retry_backoff_s: 1.0
  # Byte-identical system prefix on every remote call -> Fireworks prompt-cache discount.
  # Kept minimal: every system token is billed on every escalation.
  system: "${VERDICT_REMOTE_SYSTEM:-Answer correctly. No preamble.}"
  # Raw JSON merged into every remote request body — day-of escape hatch, e.g.
  # '{"response_format": {"type": "json_object"}}' or a reasoning-effort knob to stop
  # a reasoning model from billing hidden thinking tokens as completion tokens.
  extra_body_json: "${VERDICT_REMOTE_EXTRA_BODY:-}"
