# Per-category policy: local prompts, sampling, verification, escalation.
# This file is the single place task behavior is tuned — solvers read it, never hardcode.
#
# Classification is LLM-first (src/routing/dispatcher.py): the local model names the
# category. Trivial computables are answered even earlier by the deterministic lane.
# No regex/keyword dispatch here — it was brittle on nuance and local tokens are free.
#
# Local answers cost 0 tokens; local max_tokens exist only to bound wall-clock on CPU.
# Remote max_tokens directly cap scored Fireworks completion tokens — keep tight.
#
# CPU sizing, measured IN-CONTAINER (--cpus=2, python + llama share the quota):
# effective generation is ~8-9 tok/s, so with the 25 s task ceiling the whole task —
# prompt eval + ALL samples — must fit ~180-200 generated tokens. n_samples=2 at that
# speed is a guaranteed timeout (the 2nd sample never finishes); single-sample +
# calibrated confidence beats a timed-out escalation everywhere.

defaults:
  temperature: 0.7   # Qwen3.5 instruct general rec; greedy decoding degrades this family
  max_tokens: 384
  n_samples: 1
  repair_attempts: 1
  thinking: false
  theta: 0.55                 # calibrated-confidence floor (soft categories)
  answer_format: "{answer}"
  escalate:
    temperature: 0.0
    max_tokens: 200

categories:
  # The PAL lane: anything computable — arithmetic, dates, counting, conversions,
  # string ops — routes here. The LLM only translates English to Python; the sandboxed
  # executor computes the answer, so the model never does mental arithmetic or
  # calendar math (its weakest skills).
  math:
    solver: math
    verifier: pyexec_math
    prompt:
      system: >-
        You solve computational problems (arithmetic, word problems, dates and calendars,
        unit conversion, counting letters or words, string manipulation) by writing Python.
        Never compute in your head — always let the code compute. Use the datetime module
        for any date or weekday question. Output ONLY a fenced python code block.
        The code must be self-contained, use only the standard library, and end with a
        single print() of the final answer. Do NOT round or truncate unless the problem
        explicitly asks — print the exact value (e.g. 137.5, not 138).
        Keep the code minimal: no comments, no blank lines, no alternatives.
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous code:
        ```python
        {previous}
        ```
        It failed with: {feedback}
        Output ONLY a corrected fenced python code block ending with one print() of the answer.
    temperature: 0.7
    max_tokens: 200
    n_samples: 1
    repair_attempts: 1
    answer_format: "{answer}"
    escalate:
      instruction: "Give only the final numeric answer (with unit if the question uses one)."
      max_tokens: 40

  code_gen:
    solver: code_gen
    verifier: code_gen
    prompt:
      system: >-
        You write correct, clean Python. Output ONLY one fenced python code block with the
        requested function (plus imports if needed). No usage examples, no explanations,
        no comments — the shortest correct implementation.
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous code:
        ```python
        {previous}
        ```
        It failed: {feedback}
        Output ONLY the corrected fenced python code block.
      tests: >-
        Read the task and the candidate function signature. Write Python assert statements
        that check the examples given in the task (and 1-2 obvious edge cases if none given).
        Output ONLY a fenced python code block containing assert lines. If the task gives
        no checkable examples, output a block containing only: pass
    temperature: 0.7
    max_tokens: 240
    repair_attempts: 1
    escalate:
      instruction: "Output only the requested function as code. No explanation."
      max_tokens: 300

  code_debug:
    solver: code_debug
    verifier: code_debug
    prompt:
      system: >-
        You fix bugs. State the bug in one short sentence, then output the FULL corrected
        code in ONE fenced python code block. No comments, no explanation beyond that
        sentence.
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous fix:
        ```python
        {previous}
        ```
        It still fails: {feedback}
        State the bug in one sentence, then output the FULL corrected code in one fenced block.
    temperature: 0.7
    max_tokens: 240
    repair_attempts: 1
    answer_format: "{answer}"
    escalate:
      instruction: "Identify the bug in one sentence, then give the full corrected code."
      max_tokens: 300

  ner:
    solver: ner
    verifier: ner
    entity_types: [PERSON, ORG, LOCATION, DATE]
    agreement_f1: 0.8
    prompt:
      system: >-
        You extract named entities. Output ONLY a JSON array, no prose:
        [{"text": "<exact span from the text>", "type": "PERSON|ORG|LOCATION|DATE"}]
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous output:
        {previous}

        It was invalid: {feedback}
        Output ONLY the corrected JSON array in the required schema.
    temperature: 0.7
    max_tokens: 220
    n_samples: 1
    repair_attempts: 1
    escalate:
      instruction: >-
        Extract named entities as a JSON array of {"text": ..., "type": "PERSON|ORG|LOCATION|DATE"}.
        JSON only.
      max_tokens: 250

  summarize:
    solver: summarize
    verifier: summary_constraints
    prompt:
      system: >-
        You summarize text following the stated format and length constraints EXACTLY.
        Output only the summary — no preamble, no quotes.
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous summary:
        {previous}

        Constraint violation: {feedback}
        Rewrite the summary so it satisfies the constraint exactly. Output only the summary.
    temperature: 0.7
    max_tokens: 250
    repair_attempts: 2
    escalate:
      instruction: "Follow the length/format constraint exactly. Output only the summary."
      max_tokens: 200

  sentiment:
    solver: sentiment
    verifier: label_agreement
    labels: [positive, negative, neutral, mixed]
    prompt:
      system: >-
        You classify sentiment. Line 1: exactly one word — Positive, Negative, Neutral, or
        Mixed. Line 2: a one-sentence justification citing the wording of the text.
      user: "{prompt}"
      repair: |-
        {prompt}

        Your previous reply was invalid: {feedback}
        Reply again: line 1 exactly one label word, line 2 one-sentence justification.
    temperature: 0.7
    max_tokens: 120
    n_samples: 1
    repair_attempts: 1
    escalate:
      instruction: "Reply with the sentiment label (Positive/Negative/Neutral/Mixed) and a one-sentence justification."
      max_tokens: 60

  logic:
    solver: logic
    verifier: majority
    prompt:
      system: >-
        You solve logic puzzles. Reason step by step in AT MOST 8 short lines, checking
        every stated constraint. End with one line: "FINAL: <answer>".
      user: "{prompt}"
      repair: >-
        Your answer violated: {feedback}
        Re-solve carefully. End with one line: "FINAL: <answer>".
    # CPU: one sample within the ceiling beats three that time out. The majority verifier
    # degrades to calibrated single-sample confidence at n=1; genuinely-hard puzzles the
    # 4B can't crack should escalate — that is deserved spend, not waste.
    temperature: 0.7
    max_tokens: 200
    n_samples: 1
    majority_min: 2
    thinking: true
    theta: 0.6
    repair_attempts: 0
    escalate:
      instruction: "Solve the puzzle. Give only the final answer, one short sentence."
      max_tokens: 80

  factual:
    # No dispatch block: factual is the catch-all when nothing specific matches.
    solver: factual
    verifier: factual_agreement
    agreement_min: 0.45
    prompt:
      system: >-
        Answer factual questions accurately and concisely in 1-3 sentences. If a term is
        asked, define it directly. No filler.
      user: "{prompt}"
      repair: ""
    temperature: 0.7
    max_tokens: 150
    n_samples: 1
    theta: 0.6
    repair_attempts: 0
    escalate:
      instruction: "Answer accurately in at most 3 sentences."
      max_tokens: 120
